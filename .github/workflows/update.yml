name: Update VPN Subs Automatically

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút
  workflow_dispatch:      # Có nút bấm chạy bằng tay lúc cần test

jobs:
  update-subs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requests Library
        run: pip install requests

      - name: Run Script Rename Nodes
        run: python update_sub.py

      - name: Commit and Push Sub Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subs/
          git commit -m "Auto-update VPN subs [skip ci]" || echo "No changes to commit"
          git push
